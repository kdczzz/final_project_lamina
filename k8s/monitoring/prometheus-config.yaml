apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: chua-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "backend"
        static_configs:
          - targets: ["backend-service:8000"]
        metrics_path: /metrics
